services:
  mongodb:
    image: mongo:7.0
    container_name: expense-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: expense_tracker
    volumes:
      - mongo-data:/data/db
    networks:
      - expense-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/expense_tracker
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - expense-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - expense-network

volumes:
  mongo-data:
    driver: local

networks:
  expense-network:
    driver: bridge