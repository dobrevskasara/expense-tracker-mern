apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-frontend
  namespace: expense-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-frontend
  template:
    metadata:
      labels:
        app: expense-frontend
    spec:
      containers:
        - name: frontend
          image: saradobrevska/expense-tracker-frontend:latest
          ports:
            - containerPort: 80