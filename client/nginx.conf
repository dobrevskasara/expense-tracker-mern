server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass https://expense-tracker-backend-xcxh.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host expense-tracker-backend-xcxh.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}